title: Local Triage — Mshta or Rundll32 Loading from Public Path
id: 7c2d3e3a-1f0f-4d8a-8b3c-001100000003
description: >-
    Detects mshta.exe or rundll32.exe being launched with a payload path
    under a user-writable directory — common LOLBin abuse pattern for
    initial execution from a phishing payload or staged dropper.
author: ai-forensicator project library
date: 2026/04/26
level: high
status: stable
references:
    - https://lolbas-project.github.io/lolbas/Binaries/Mshta/
    - https://lolbas-project.github.io/lolbas/Binaries/Rundll32/
tags:
    - attack.execution
    - attack.defense_evasion
    - attack.t1218.005
    - attack.t1218.011
logsource:
    category: process_creation
    product: windows
detection:
    selection_image:
        Image|endswith:
            - '\mshta.exe'
            - '\rundll32.exe'
    selection_path:
        CommandLine|contains:
            - '\Temp\'
            - '\AppData\Roaming\'
            - '\AppData\Local\Temp\'
            - '\ProgramData\'
            - '\Users\Public\'
            - 'http://'
            - 'https://'
    condition: selection_image and selection_path
fields:
    - User
    - ParentImage
    - CommandLine
falsepositives:
    - Some legitimate installers stage helper DLLs in Public; verify signer
