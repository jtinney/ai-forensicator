title: Local Triage — Suspicious Service Install via sc.exe
id: 7c2d3e3a-1f0f-4d8a-8b3c-001100000002
description: >-
    Detects a service install through `sc.exe create` whose binPath points
    at a user-writable location (Temp / AppData / ProgramData) — a common
    persistence technique used by post-exploitation kits.
author: ai-forensicator project library
date: 2026/04/26
level: high
status: stable
references:
    - https://attack.mitre.org/techniques/T1543/003/
tags:
    - attack.persistence
    - attack.privilege_escalation
    - attack.t1543.003
logsource:
    category: process_creation
    product: windows
detection:
    selection_image:
        Image|endswith: '\sc.exe'
    selection_verb:
        CommandLine|contains: ' create '
    selection_path:
        CommandLine|contains:
            - '\Temp\'
            - '\AppData\'
            - '\ProgramData\'
            - '\Users\Public\'
    condition: all of selection_*
fields:
    - User
    - ParentImage
    - CommandLine
falsepositives:
    - Niche admin scripts that stage service binaries in Public — verify signer and origin
