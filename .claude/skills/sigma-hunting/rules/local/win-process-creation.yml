# Project-library Sigma rules — Windows process_creation channel.
#
# Each rule conforms to the project metadata convention documented in
# `.claude/skills/sigma-hunting/SKILL.md` § Rule conventions.
#
# Run via:
#   chainsaw hunt <evtx_dir> \
#       -s .claude/skills/sigma-hunting/rules/local/ \
#       --mapping .claude/skills/sigma-hunting/mappings/sigma-event-logs-all.yml \
#       --csv -o ./analysis/sigma/hits/

title: Local Triage — PowerShell Encoded Command
id: 7c2d3e3a-1f0f-4d8a-8b3c-001100000001
description: >-
    Detects PowerShell invocation with -EncodedCommand or its short-form
    -e / -enc, which is the canonical pattern for obfuscated PowerShell
    payloads dropped by exploit kits, droppers, and post-exploitation
    frameworks.
author: ai-forensicator project library
date: 2026/04/26
level: high
status: stable
references:
    - https://attack.mitre.org/techniques/T1059/001/
    - https://docs.microsoft.com/powershell/module/microsoft.powershell.core/about/about_powershell_exe
tags:
    - attack.execution
    - attack.t1059.001
    - attack.defense_evasion
    - attack.t1027
logsource:
    category: process_creation
    product: windows
detection:
    selection_image:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
    selection_args:
        CommandLine|contains:
            - ' -EncodedCommand '
            - ' -enc '
            - ' -e '
            - ' -ec '
    condition: selection_image and selection_args
fields:
    - User
    - ParentImage
    - CommandLine
falsepositives:
    - Some installers and management tooling pass -EncodedCommand for legitimate reasons; check parent process and signer
